<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--added font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--added a google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--added tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
<!-- added favicon -->
    <link rel="icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>

</head>

<body>
    
   <section id="login-page" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-white w-20 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <img src="./assets/github-logo.png" alt="a GitHub logo in the center of a log in page">
                </div>
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-200 border-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-200 border-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-gray-100 text-xl font-semibold py-3 rounded-lg transition">Log In</button>
            </form>

            <div class="mt-6 p-4  rounded-lg border border-none shadow-xs">
                <p class="text-xl font-bold text-blue-800 mb-2">Demo Credentials</p>
                <p class="text-sm ">Username: <span>admin</span></p>
                <p class="text-sm ">Password: <span>admin123</span></p>
            </div>
        </div>
    </section>


         <section id="main-page" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white border-b sticky top-0 z-10">
            <div class=" mx-auto px-10 h-full flex items-center sm:grid-cols-1 justify-between ">
                <div class=" flex items-center gap-2 p-5 ">
                    <img class="lg:w-9 h-9" src="./assets/github-logo.png" alt="">
                    <h2 class="text-2xl font-semibold text-gray-800">GitHub Issues Tracker</h2>
                </div>
                <div class="flex gap-2 w-1/2 max-w-sm">
                    <input type="text" id="search-input" placeholder="Search issues..." class="w-full px-4 py-2 border rounded-md text-sm focus:outline-none focus:ring-1 focus:ring-blue-500 bg-gray-200 border-none">
                    <button id="search-btn" class="bg-blue-700 text-white px-4 py-2 rounded-md hover:bg-black transition text-sm">Search</button>
                </div>
            </div>
        </nav>
        
        <main class="max-w-7xl mx-auto px-4 py-8 w-full grow">
           
            
            <div class="bg-white mb-8 border-b lg:flex grid-cols-1 gap-3 overflow-x-auto sticky top-20 z-20 sm:mx-auto">
                <button onclick="filterData('all')" class="tab-btn active-tab lg:py-3 px-5 sm:py-1 px-2 text-xl flex items-center gap-2  m-2 rounded bg-blue-600 text-white font-bold">
                     All <span id="count-all" class="text-gray-100 px-2 rounded-full font-bold text-xs">0</span>
                </button>
                <button onclick="filterData('open')" class="tab-btn py-3 px-5 text-xl flex items-center gap-2  hover:text-blue-600  m-2 rounded  bg-gray-100 text-black font-bold">
                    <img src="./assets/Open-Status.png" alt=""> Open <span id="count-open" class="bg-gray-200 px-2 rounded-full text-xs">0</span>
                </button>
                <button onclick="filterData('closed')" class="tab-btn py-3 px-5 text-xl flex items-center gap-2  hover:text-blue-600  m-2 rounded bg-gray-100 text-black font-bold">
                    <img src="./assets/Closed- Status .png" alt=""> Closed <span id="count-closed" class="bg-gray-200 px-2 rounded-full text-xs">0</span>
                </button>
            </div>
             <div class="bg-gray-100 py-2 px-5 flex gap-5 items-center mb-3">
                <div class="text-2xl">
                <img class="w-9 h-9" src="./assets/Aperture.png" alt="">
                </div>
                <div>
                <h2 class="text-2xl  font-bold">50 issues</h2>
                <p class="text-gray-500">Track and manage your project issues</p>
                </div>
                </div>

            <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p class="text-gray-500 animate-pulse">Loading...</p>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
    </section>

<!-- please click on the card-title to show the modal -->
<div id="issue-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-white rounded-lg max-w-2xl w-full overflow-hidden shadow-2xl border border-gray-200">
        <div id="modal-content">
            </div>
        <div class="p-4 bg-gray-50/50 border-t flex justify-end">
            <button onclick="closeModal()" class="px-8 py-2 bg-red-500 text-white font-semibold rounded-md hover:bg-opacity-90 transition shadow-sm">Close</button>
        </div>
    </div>
</div>

<script src="./script.js"></script>
</body>
</body>
</html>
