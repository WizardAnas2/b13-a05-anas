<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--added font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--added a google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!--added tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
<!-- added favicon -->
    <link rel="icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issue Tracker</title>

</head>

<body>
    
   <section id="login-page" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-white w-20 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <img src="./assets/github-logo.png" alt="a GitHub logo in the center of a log in page">
                </div>
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-200 border-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition bg-gray-200 border-none" required>
                </div>
                <button type="submit" class="w-full bg-blue-500 hover:bg-blue-700 text-gray-100 text-xl font-semibold py-3 rounded-lg transition">Log In</button>
            </form>

            <div class="mt-6 p-4  rounded-lg border border-none shadow-xs">
                <p class="text-xl font-bold text-blue-800 mb-2">Demo Credentials</p>
                <p class="text-sm ">Username: <span>admin</span></p>
                <p class="text-sm ">Password: <span>admin123</span></p>
            </div>
        </div>
    </section>

</body>
</html>
